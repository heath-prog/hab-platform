kind = "web"
previewPath = "/"
title = "Healthy Auto Business"
version = "1.0.0"
id = "artifacts/acquisition-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21765

[services.development]
run = "pnpm --filter @workspace/acquisition-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/acquisition-dashboard", "run", "build" ]
publicDir = "artifacts/acquisition-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21765"
BASE_PATH = "/"
